<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>URL 공유 바둑 (문제 SGF 지원)</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; width: 100%; max-width: 540px; }
        h1 { margin-top: 0; margin-bottom: 15px; color: #333; font-size: 20px; }
        #board-container { position: relative; width: 100%; aspect-ratio: 1 / 1; background-color: #e6b873; border: 2px solid #b38644; box-shadow: inset 0 0 10px rgba(0,0,0,0.15); cursor: pointer; border-radius: 4px; margin: 0 auto; -webkit-user-select: none; user-select: none; }
        svg { width: 100%; height: 100%; display: block; }
        
        .controls { margin-top: 15px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        button { padding: 12px; font-size: 13px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
        .btn-primary { background-color: #4f46e5; color: white; }
        .btn-secondary { background-color: #9ca3af; color: white; }
        .btn-download { background-color: #059669; color: white; }
        .btn-upload { background-color: #d97706; color: white; } 
        .btn-danger { background-color: #ef4444; color: white; grid-column: span 2; } 
        
        .status-box { margin-top: 12px; padding: 10px; background: #f9fafb; border-radius: 6px; font-size: 14px; font-weight: 500; }
        .turn-indicator { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
        .turn-B { background: black; }
        .turn-W { background: white; border: 1px solid #ccc; }

        .import-box { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #ddd; display: flex; flex-direction: column; gap: 8px; }
        .import-box input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; }
        .btn-success { background-color: #10b981; color: white; padding: 12px; }

        @media (max-width: 600px) {
            body { padding: 0; background-color: white; }
            .container { padding: 0; border-radius: 0; box-shadow: none; }
            #board-container { border-left: none; border-right: none; border-radius: 0; }
            .status-box, .controls, .import-box { margin-left: 12px; margin-right: 12px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🌐 URL 공유 바둑판 (문제 지원)</h1>
    
    <div id="board-container">
        <svg id="baduk-board" viewBox="0 0 400 400"></svg>
    </div>

    <div class="status-box">
        <span id="turn-color" class="turn-indicator turn-B"></span>
        <span id="status-text">흑의 차례 (총 0수)</span>
    </div>

    <input type="file" id="sgf-file-input" accept=".sgf" style="display: none;" onchange="loadSGFFile(event)">

    <div class="controls">
        <button class="btn-primary" onclick="copyLink()">🔗 링크 복사</button>
        <button class="btn-secondary" onclick="undoMove()">↩ 무르기</button>
        <button class="btn-download" onclick="downloadSGF()">💾 SGF 저장</button>
        <button class="btn-upload" onclick="document.getElementById('sgf-file-input').click()">📂 SGF 열기</button>
        <button class="btn-danger" onclick="resetBoard()">🔄 초기화</button>
    </div>

    <div class="import-box">
        <input type="text" id="friend-url" placeholder="친구 링크나 코드를 붙여넣으세요">
        <button class="btn-success" onclick="loadFriendUrl()">▶ 업데이트</button>
    </div>
</div>

<script>
    const size = 19;
    const chars = 'abcdefghijklmnopqrs';
    const svg = document.getElementById('baduk-board');
    const pad = 20, step = 20;

    function initBoardLayout() {
        let html = '';
        for(let i=0; i<size; i++) {
            let pos = pad + i * step;
            html += `<line x1="${pad}" y1="${pos}" x2="${pad + (size-1)*step}" y2="${pos}" stroke="#555" stroke-width="0.8"/>`;
            html += `<line x1="${pos}" y1="${pad}" x2="${pos}" y2="${pad + (size-1)*step}" stroke="#555" stroke-width="0.8"/>`;
        }
        const stars = [3, 9, 15];
        stars.forEach(cx => {
            stars.forEach(cy => {
                html += `<circle cx="${pad + cx * step}" cy="${pad + cy * step}" r="2.5" fill="#333"/>`;
            });
        });
        html += `<g id="stones"></g>`;
        svg.innerHTML = html;
    }

    // [핵심] 해시 데이터를 '사전배치돌'과 '수순'으로 완벽히 분리하는 도우미 함수
    function parseHashData(hashString) {
        let setupB = "", setupW = "", moves = "";
        if (hashString.includes('B') || hashString.includes('W') || hashString.includes('_')) {
            let parts = hashString.split('_');
            let setupPart = parts[0];
            moves = parts[1] || "";
            
            let bIdx = setupPart.indexOf('B');
            let wIdx = setupPart.indexOf('W');
            
            if (bIdx !== -1 && wIdx !== -1) {
                if (bIdx < wIdx) {
                    setupB = setupPart.substring(bIdx + 1, wIdx);
                    setupW = setupPart.substring(wIdx + 1);
                } else {
                    setupW = setupPart.substring(wIdx + 1, bIdx);
                    setupB = setupPart.substring(bIdx + 1);
                }
            } else if (bIdx !== -1) {
                setupB = setupPart.substring(bIdx + 1);
            } else if (wIdx !== -1) {
                setupW = setupPart.substring(wIdx + 1);
            }
        } else {
            moves = hashString;
        }
        return { setupB, setupW, moves };
    }

    // SGF 불러오기 로직 (문제와 일반 기보 완벽 분기)
    function loadSGFFile(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const content = e.target.result;
            let setupB = "", setupW = "", hasSetup = false;

            // AB (Add Black), AW (Add White) 사전 배치 돌 추출
            const abMatches = content.match(/AB(\[[a-zA-Z]{2}\])+/g);
            if (abMatches) {
                hasSetup = true;
                abMatches.forEach(m => {
                    let coords = m.match(/\[([a-zA-Z]{2})\]/g);
                    if(coords) coords.forEach(c => setupB += c.slice(1,3).toLowerCase());
                });
            }

            const awMatches = content.match(/AW(\[[a-zA-Z]{2}\])+/g);
            if (awMatches) {
                hasSetup = true;
                awMatches.forEach(m => {
                    let coords = m.match(/\[([a-zA-Z]{2})\]/g);
                    if(coords) coords.forEach(c => setupW += c.slice(1,3).toLowerCase());
                });
            }

            if (hasSetup) {
                // [문제 장면도 모드] 수순 무시하고 초기 세팅만 표시
                let newHash = "";
                if (setupB) newHash += "B" + setupB;
                if (setupW) newHash += "W" + setupW;
                newHash += "_"; // 뒷부분(수순)을 완전히 비워서 초기 장면 연출
                window.location.hash = newHash;
            } else {
                // [일반 기보 모드] 사전 배치가 없다면 기존처럼 모든 수순을 로드
                const regex = /;[BW]\[([a-zA-Z]{2})\]/g;
                let match, extractedHash = '';
                while ((match = regex.exec(content)) !== null) {
                    extractedHash += match[1].toLowerCase();
                }
                if (extractedHash.length > 0) window.location.hash = extractedHash;
                else alert("기보에 착수 정보가 없습니다.");
            }
            event.target.value = ''; // 같은 파일 재선택 허용
        };
        reader.readAsText(file);
    }

    // SGF 다운로드 시 사전 배치 돌도 함께 저장되도록 기능 강화
    function downloadSGF() {
        let hash = window.location.hash.substring(1);
        if (!hash) { alert("아직 바둑판에 돌이 없습니다!"); return; }

        let { setupB, setupW, moves } = parseHashData(hash);
        let sgfContent = "(;GM[1]FF[4]SZ[19]AP[BadukWeb:2.0]DT[" + new Date().toISOString().slice(0,10) + "]";
        
        if (setupB) {
            sgfContent += "AB";
            for(let i=0; i<setupB.length; i+=2) sgfContent += `[${setupB[i]}${setupB[i+1]}]`;
        }
        if (setupW) {
            sgfContent += "AW";
            for(let i=0; i<setupW.length; i+=2) sgfContent += `[${setupW[i]}${setupW[i+1]}]`;
        }

        for (let i = 0; i < moves.length; i += 2) {
            let x = moves[i], y = moves[i+1];
            let color = (i/2 % 2 === 0) ? 'B' : 'W';
            sgfContent += `;${color}[${x}${y}]`;
        }
        sgfContent += ")";

        const blob = new Blob([sgfContent], { type: 'application/x-go-sgf' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "problem_game.sgf";
        a.click();
        URL.revokeObjectURL(url);
    }

    function computeBoardState(hashString) {
        let board = Array(size).fill(null).map(() => Array(size).fill(null));
        let { setupB, setupW, moves } = parseHashData(hashString);
        
        // 1. 문제(사전 배치) 돌 먼저 보드에 깔기
        for (let i = 0; i < setupB.length; i += 2) {
            let x = chars.indexOf(setupB[i]), y = chars.indexOf(setupB[i+1]);
            if (x >= 0 && x < size && y >= 0 && y < size) board[y][x] = 'B';
        }
        for (let i = 0; i < setupW.length; i += 2) {
            let x = chars.indexOf(setupW[i]), y = chars.indexOf(setupW[i+1]);
            if (x >= 0 && x < size && y >= 0 && y < size) board[y][x] = 'W';
        }

        // 2. 이후 실제 수순 진행
        let moveCount = 0;
        let lastX = -1, lastY = -1;

        for (let i = 0; i < moves.length; i += 2) {
            let x = chars.indexOf(moves[i]), y = chars.indexOf(moves[i+1]);
            if (x >= 0 && x < size && y >= 0 && y < size) {
                if (board[y][x] !== null) continue;
                let color = (moveCount % 2 === 0) ? 'B' : 'W';
                board[y][x] = color;
                moveCount++;
                lastX = x; lastY = y;

                let opponent = color === 'B' ? 'W' : 'B';
                let dirs = [[-1,0],[1,0],[0,-1],[0,1]];
                dirs.forEach(([dx, dy]) => {
                    let nx = x + dx, ny = y + dy;
                    if (nx >= 0 && nx < size && ny >= 0 && ny < size && board[ny][nx] === opponent) {
                        let group = [], liberties = new Set(), visited = Array(size).fill(null).map(() => Array(size).fill(false));
                        function dfs(cx, cy) {
                            visited[cy][cx] = true; group.push({x: cx, y: cy});
                            dirs.forEach(([idx, idy]) => {
                                let nnx = cx + idx, nny = cy + idy;
                                if (nnx >= 0 && nnx < size && nny >= 0 && nny < size) {
                                    if (board[nny][nnx] === null) liberties.add(`${nnx},${nny}`);
                                    else if (board[nny][nnx] === opponent && !visited[nny][nnx]) dfs(nnx, nny);
                                }
                            });
                        }
                        dfs(nx, ny);
                        if (liberties.size === 0) group.forEach(p => { board[p.y][p.x] = null; });
                    }
                });
                
                let ownLiberties = new Set(), ownVisited = Array(size).fill(null).map(() => Array(size).fill(false));
                function dfsOwn(cx, cy) {
                    ownVisited[cy][cx] = true;
                    dirs.forEach(([idx, idy]) => {
                        let nnx = cx + idx, nny = cy + idy;
                        if (nnx >= 0 && nnx < size && nny >= 0 && nny < size) {
                            if (board[nny][nnx] === null) ownLiberties.add(`${nnx},${nny}`);
                            else if (board[nny][nnx] === color && !ownVisited[nny][nnx]) dfsOwn(nnx, nny);
                        }
                    });
                }
                dfsOwn(x, y);
                if (ownLiberties.size === 0) { board[y][x] = null; moveCount--; if(i === moves.length - 2) { lastX = -1; lastY = -1; } }
            }
        }
        return { board, moveCount, lastX, lastY };
    }

    function render() {
        let hash = window.location.hash.substring(1);
        let { board, moveCount, lastX, lastY } = computeBoardState(hash);
        let stonesGroup = document.getElementById('stones');
        let html = '';
        for (let y = 0; y < size; y++) {
            for (let x = 0; x < size; x++) {
                if (board[y][x] !== null) {
                    let cx = pad + x * step, cy = pad + y * step;
                    let isLast = (x === lastX && y === lastY);
                    if (board[y][x] === 'B') {
                        html += `<circle cx="${cx}" cy="${cy}" r="9.3" fill="#111" stroke="#000" stroke-width="0.5"/>`;
                        if (isLast) html += `<circle cx="${cx}" cy="${cy}" r="2.5" fill="white"/>`;
                    } else {
                        html += `<circle cx="${cx}" cy="${cy}" r="9.3" fill="#fff" stroke="#999" stroke-width="0.8"/>`;
                        if (isLast) html += `<circle cx="${cx}" cy="${cy}" r="2.5" fill="black"/>`;
                    }
                }
            }
        }
        stonesGroup.innerHTML = html;
        let nextColor = (moveCount % 2 === 0) ? 'B' : 'W';
        document.getElementById('turn-color').className = `turn-indicator turn-${nextColor}`;
        document.getElementById('status-text').innerText = `${nextColor === 'B' ? '흑' : '백'}의 차례 (총 ${moveCount}수)`;
    }

    document.getElementById('board-container').addEventListener('click', function(e) {
        let rect = this.getBoundingClientRect();
        let mouseX = e.clientX - rect.left, mouseY = e.clientY - rect.top;
        let gridX = Math.round(((mouseX / rect.width) * 400 - pad) / step);
        let gridY = Math.round(((mouseY / rect.height) * 400 - pad) / step);

        if (gridX >= 0 && gridX < size && gridY >= 0 && gridY < size) {
            let currentHash = window.location.hash.substring(1);
            let { setupB, setupW, moves } = parseHashData(currentHash);
            
            let nextMove = chars[gridX] + chars[gridY];
            let newMoves = moves + nextMove;
            
            let newHash = "";
            if (setupB || setupW) {
                if (setupB) newHash += "B" + setupB;
                if (setupW) newHash += "W" + setupW;
                newHash += "_" + newMoves; // 문제 모드 유지하며 수순 추가
            } else {
                newHash = newMoves; // 일반 모드
            }
            window.location.hash = newHash;
        }
    });

    function undoMove() {
        let currentHash = window.location.hash.substring(1);
        let { setupB, setupW, moves } = parseHashData(currentHash);
        
        if (moves.length >= 2) {
            let newMoves = moves.slice(0, -2);
            let newHash = "";
            if (setupB || setupW) {
                if (setupB) newHash += "B" + setupB;
                if (setupW) newHash += "W" + setupW;
                newHash += "_" + newMoves;
            } else {
                newHash = newMoves;
            }
            window.location.hash = newHash;
        }
    }

    function copyLink() {
        navigator.clipboard.writeText(window.location.href).then(() => alert("🔗 링크가 복사되었습니다!"));
    }
    
    function loadFriendUrl() {
        let inputVal = document.getElementById('friend-url').value.trim();
        if(!inputVal) return;
        let hashIdx = inputVal.indexOf('#');
        window.location.hash = hashIdx !== -1 ? inputVal.substring(hashIdx + 1) : inputVal;
        document.getElementById('friend-url').value = '';
    }
    
    function resetBoard() {
        if (confirm("초기화하시겠습니까?")) window.location.hash = '';
    }

    window.addEventListener('hashchange', render);
    initBoardLayout();
    render();
</script>

</body>
</html>
