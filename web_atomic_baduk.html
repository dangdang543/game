<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web Atomic Baduk</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            background-color: #1a1a1a; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            color: white;
        }
        
        .container { 
            background: #2c2c2c; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.5); 
            display: flex; 
            flex-direction: row; 
            align-items: flex-start; 
            justify-content: center; 
            width: 100%; 
            max-width: 1100px; 
            gap: 30px;
        }
        
        #board-container { 
            position: relative; 
            aspect-ratio: 1 / 1; 
            background-color: #D8A45D; 
            border: 4px solid #333; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5); 
            cursor: pointer; 
            border-radius: 4px; 
            -webkit-user-select: none; 
            user-select: none;
            flex: 1 1 auto; 
            max-height: calc(100vh - 80px);
            max-width: calc(100vh - 80px);
            width: 100%;
        }
        svg { width: 100%; height: 100%; display: block; }
        
        .sidebar {
            flex: 0 0 320px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            width: 100%;
        }

        .status-box { 
            padding: 15px; 
            background: #111; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: bold; 
            text-align: center; 
            border: 1px solid #444;
        }

        .bomb-stats { 
            display: flex; 
            justify-content: space-around; 
            font-size: 1.2rem; 
            margin-top: 10px;
        }
        .b-text { color: #aaa; } 
        .w-text { color: #fff; } 
        .b-text span, .w-text span { font-size: 1.5rem; font-weight: bold; color: #ffeb3b; }

        .controls-container { display: flex; flex-direction: column; gap: 10px; }
        .row-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .nav-grid { display: flex; gap: 8px; width: 100%; align-items: stretch; justify-content: space-between; margin-top: 10px; }
        
        button { 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            transition: all 0.2s; 
            -webkit-tap-highlight-color: transparent; 
            font-family: inherit; 
            padding: 12px 4px; 
            font-size: 14px; 
            font-weight: bold; 
            color: white;
        }
        button:active { transform: scale(0.96); }
        
        .btn-link { background-color: #059669; }
        .btn-seq { background-color: #2196F3; }
        .btn-seq.active { background-color: #0d47a1; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); border: 1px solid #fff; }
        .btn-bomb { background-color: #ff5252; }
        .btn-bomb.active { background-color: #ffeb3b; color: black; box-shadow: 0 0 20px #ffeb3b; animation: shake 0.2s infinite; }
        .btn-capture { background-color: #9c27b0; }
        
        .btn-nav { background-color: #444; flex: 1; font-size: 18px; }

        #move-input { 
            width: 70px; 
            flex-shrink: 0; 
            text-align: center; 
            font-size: 16px; 
            font-weight: bold; 
            border: 2px solid #555; 
            border-radius: 6px; 
            background: #222; 
            color: white; 
            outline: none; 
        }
        #move-input:focus { border-color: #ffeb3b; }

        @keyframes shake { 
            0% { transform: translate(1px, 1px); } 
            50% { transform: translate(-1px, -1px); } 
            100% { transform: translate(0,0); } 
        }

        @media (max-width: 800px) {
            body { padding: 0; align-items: flex-start; }
            .container { flex-direction: column; align-items: center; padding: 10px; border-radius: 0; box-shadow: none; gap: 15px; }
            #board-container { max-width: 100vw; max-height: 100vw; flex: none; border-width: 2px; }
            .sidebar { flex: none; max-width: 400px; padding-bottom: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="board-container">
        <svg id="baduk-board" viewBox="0 0 400 400"></svg>
    </div>

    <div class="sidebar">
        <div class="status-box">
            <div id="status-text" style="color: #00e676;">흑의 차례입니다</div>
            <div class="bomb-stats">
                <div class="b-text">흑폭탄갯수: <span id="b-bomb-count">0</span></div>
                <div class="w-text">백폭탄갯수: <span id="w-bomb-count">0</span></div>
            </div>
        </div>

        <div class="controls-container">
            <div class="row-grid">
                <button class="btn-link" onclick="copyLink()">🔗 링크복사</button>
                <button id="btn-seq" class="btn-seq" onclick="toggleMoveNumbers()">🔢 수순보기</button>
                <button id="btn-bomb" class="btn-bomb" onclick="toggleBombMode()">💣 폭탄투하</button>
                <button class="btn-capture" onclick="captureBoard()">📸 캡쳐</button>
            </div>
            
            <div class="nav-grid">
                <button class="btn-nav" onclick="goPrevMove()" title="왼쪽 화살표">◀</button>
                <input type="number" id="move-input" min="0" value="0" onkeydown="handleInputEnter(event)" onblur="jumpToMove()" title="현재 수순 번호">
                <button class="btn-nav" onclick="goNextMove()" title="오른쪽 화살표">▶</button>
            </div>
        </div>
    </div>
</div>

<script>
    const size = 19;
    const chars = 'abcdefghijklmnopqrs';       
    const UPPER_chars = 'ABCDEFGHIJKLMNOPQRS'; 
    const svg = document.getElementById('baduk-board');
    const pad = 20, step = 20;

    let currentMoveIndex = 0;       
    let showMoveNumbers = false;    
    let bombMode = false;

    function computeBoardState(hashString, maxMoves) {
        let board = Array(size).fill(0).map(() => Array(size).fill(0));
        let moves = hashString;
        
        if (maxMoves !== undefined) {
            moves = moves.substring(0, maxMoves * 2);
        }

        let bBombs = 0, wBombs = 0;
        let moveCount = 0;
        let turn = 1; 
        let moveHistory = []; 
        let lastX = -1, lastY = -1;

        function processCapturesLocal(cx, cy, oppColor) {
            let total = 0;
            const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
            dirs.forEach(([dx, dy]) => {
                let nx = cx + dx, ny = cy + dy;
                if (nx>=0 && nx<size && ny>=0 && ny<size && board[ny][nx] === oppColor) {
                    if (!hasLibertiesLocal(nx, ny, oppColor, new Set())) {
                        total += removeGroupLocal(nx, ny, oppColor);
                    }
                }
            });
            return total;
        }

        function hasLibertiesLocal(cx, cy, color, visited) {
            visited.add(`${cx},${cy}`);
            const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
            for (let [dx, dy] of dirs) {
                let nx = cx+dx, ny = cy+dy;
                if (nx>=0 && nx<size && ny>=0 && ny<size) {
                    if (board[ny][nx] === 0) return true;
                    if (board[ny][nx] === color && !visited.has(`${nx},${ny}`)) {
                        if (hasLibertiesLocal(nx, ny, color, visited)) return true;
                    }
                }
            }
            return false;
        }

        function removeGroupLocal(cx, cy, color) {
            let count = 1; 
            board[cy][cx] = 0;
            const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
            dirs.forEach(([dx, dy]) => {
                let nx = cx+dx, ny = cy+dy;
                if (nx>=0 && nx<size && ny>=0 && ny<size && board[ny][nx] === color) {
                    count += removeGroupLocal(nx, ny, color);
                }
            });
            return count;
        }

        for (let i = 0; i < moves.length; i += 2) {
            let cX = moves[i];
            let cY = moves[i+1];
            
            let isBomb = (cX === cX.toUpperCase() && UPPER_chars.includes(cX));
            let x = isBomb ? UPPER_chars.indexOf(cX) : chars.indexOf(cX);
            let y = isBomb ? UPPER_chars.indexOf(cY) : chars.indexOf(cY);
            
            if (x >= 0 && x < size && y >= 0 && y < size) {
                moveCount++;
                
                if (isBomb) {
                    // 1. 돌 위에 폭탄이 직접 떨어진 경우 해당 돌 파괴 및 폭탄 획득
                    let existingStone = board[y][x];
                    if (existingStone === 1) wBombs++; 
                    else if (existingStone === 2) bBombs++;

                    board[y][x] = -1; // 교차점 파괴
                    if (turn === 1) bBombs--; else wBombs--;
                    moveHistory.push({ x, y, type: 'bomb', moveNum: moveCount, color: turn });
                    lastX = x; lastY = y;

                    // 2. 폭탄 투하로 인해 상대방 돌의 활로가 막혀 죽는 경우 포획 처리
                    let oppColor = turn === 1 ? 2 : 1;
                    let capturedOpp = processCapturesLocal(x, y, oppColor);
                    if (capturedOpp > 0) {
                        if (turn === 1) bBombs += capturedOpp; else wBombs += capturedOpp;
                    }

                    // 3. 폭탄 투하로 인해 본인 돌의 활로가 막혀 죽는 경우 (상대방에게 폭탄 제공)
                    let capturedSelf = processCapturesLocal(x, y, turn);
                    if (capturedSelf > 0) {
                        if (turn === 1) wBombs += capturedSelf; else bBombs += capturedSelf;
                    }

                } else {
                    board[y][x] = turn;
                    moveHistory.push({ x, y, type: 'move', moveNum: moveCount, color: turn });
                    lastX = x; lastY = y;

                    let oppColor = turn === 1 ? 2 : 1;
                    let captured = processCapturesLocal(x, y, oppColor);
                    
                    if (captured > 0) {
                        if (turn === 1) bBombs += captured; else wBombs += captured;
                    } else {
                        // 자살수 방지: 활로가 없는데 포획도 못했다면 착수 무효화
                        if (!hasLibertiesLocal(x, y, turn, new Set())) {
                            board[y][x] = 0; 
                            moveHistory.pop();
                            moveCount--;
                            continue; // 턴 안넘기고 스킵 (URL 무효 수순)
                        }
                    }
                }
                turn = turn === 1 ? 2 : 1;
            }
        }
        return { board, bBombs, wBombs, turn, moveCount, moveHistory, lastX, lastY };
    }

    function render() {
        let hash = window.location.hash.substring(1);
        let { board, bBombs, wBombs, turn, moveCount, moveHistory, lastX, lastY } = computeBoardState(hash, currentMoveIndex);
        
        let html = '';

        for(let y=0; y<size; y++){
            for(let x=0; x<size; x++){
                if(board[y][x] === -1) continue; 
                let cx = pad + x*step;
                let cy = pad + y*step;
                if(x < size-1 && board[y][x+1] !== -1) {
                    html += `<line x1="${cx}" y1="${cy}" x2="${cx+step}" y2="${cy}" stroke="#333" stroke-width="0.8"/>`;
                }
                if(y < size-1 && board[y+1][x] !== -1) {
                    html += `<line x1="${cx}" y1="${cy}" x2="${cx}" y2="${cy+step}" stroke="#333" stroke-width="0.8"/>`;
                }
            }
        }

        const stars = [3, 9, 15];
        stars.forEach(cx => {
            stars.forEach(cy => {
                if(board[cy][cx] !== -1) {
                    html += `<circle cx="${pad + cx * step}" cy="${pad + cy * step}" r="2.5" fill="#333"/>`;
                }
            });
        });

        for (let y = 0; y < size; y++) {
            for (let x = 0; x < size; x++) {
                let cx = pad + x * step, cy = pad + y * step;
                
                if (board[y][x] === 1) { 
                    html += `<circle cx="${cx}" cy="${cy}" r="9.3" fill="#111" stroke="#000" stroke-width="0.5"/>`;
                } else if (board[y][x] === 2) { 
                    html += `<circle cx="${cx}" cy="${cy}" r="9.3" fill="#fff" stroke="#999" stroke-width="0.8"/>`;
                }
                
                let isLast = (x === lastX && y === lastY && board[y][x] > 0);
                if (isLast && !showMoveNumbers) {
                    let markerColor = board[y][x] === 1 ? 'white' : 'black';
                    html += `<circle cx="${cx}" cy="${cy}" r="2.5" fill="${markerColor}"/>`;
                }
            }
        }

        if (showMoveNumbers) {
            moveHistory.forEach(mv => {
                let cx = pad + mv.x * step;
                let cy = pad + mv.y * step;
                
                if (mv.type === 'move' && board[mv.y][mv.x] > 0) {
                    let textColor = mv.color === 1 ? 'white' : 'black';
                    let fontSize = mv.moveNum >= 100 ? 9 : 10;
                    html += `<text x="${cx}" y="${cy}" fill="${textColor}" font-size="${fontSize}" font-weight="bold" text-anchor="middle" dominant-baseline="central">${mv.moveNum}</text>`;
                } else if (mv.type === 'bomb' && board[mv.y][mv.x] === -1) {
                    html += `<text x="${cx}" y="${cy}" fill="#ff5252" font-size="10" font-weight="bold" text-anchor="middle" dominant-baseline="central" style="text-shadow: 1px 1px 2px #000;">${mv.moveNum}B</text>`;
                }
            });
        }

        svg.innerHTML = html;
        
        document.getElementById('b-bomb-count').innerText = bBombs;
        document.getElementById('w-bomb-count').innerText = wBombs;
        document.getElementById('move-input').value = moveCount;
        
        const statusText = document.getElementById('status-text');
        if (bombMode) {
            let hasBombs = (turn === 1 && bBombs > 0) || (turn === 2 && wBombs > 0);
            statusText.innerText = "⚠ 폭탄 투하 모드";
            statusText.style.color = hasBombs ? "#ffeb3b" : "#ff5252";
        } else {
            statusText.innerText = (turn === 1 ? "흑" : "백") + "의 차례입니다";
            statusText.style.color = turn === 1 ? "#00e676" : "#fff";
        }
    }

    document.getElementById('board-container').addEventListener('click', function(e) {
        let rect = this.getBoundingClientRect();
        let mouseX = e.clientX - rect.left, mouseY = e.clientY - rect.top;
        let gridX = Math.round(((mouseX / rect.width) * 400 - pad) / step);
        let gridY = Math.round(((mouseY / rect.height) * 400 - pad) / step);

        if (gridX >= 0 && gridX < size && gridY >= 0 && gridY < size) {
            let currentHash = window.location.hash.substring(1);
            let state = computeBoardState(currentHash, currentMoveIndex);
            
            let cell = state.board[gridY][gridX];

            if (bombMode) {
                // 파괴된 곳(-1)엔 다시 폭탄 투하 불가. (일반 돌 위에는 투하 가능)
                if (cell === -1) return; 

                let hasBomb = (state.turn === 1 && state.bBombs > 0) || (state.turn === 2 && state.wBombs > 0);
                if (!hasBomb) return; 
                
                let nextMove = UPPER_chars[gridX] + UPPER_chars[gridY];
                let moves = currentHash.substring(0, currentMoveIndex * 2);
                window.location.hash = moves + nextMove;
                
                bombMode = false; 
                document.getElementById('btn-bomb').classList.remove('active');
            } else {
                // 일반 착수는 빈 곳(0)에만 가능
                if (cell !== 0) return;
                
                let nextMove = chars[gridX] + chars[gridY];
                let moves = currentHash.substring(0, currentMoveIndex * 2);
                window.location.hash = moves + nextMove;
            }
        }
    });

    window.addEventListener('hashchange', () => {
        let currentHash = window.location.hash.substring(1);
        currentMoveIndex = currentHash.length / 2;
        render();
    });

    function toggleBombMode() { 
        bombMode = !bombMode; 
        document.getElementById('btn-bomb').classList.toggle('active', bombMode);
        render();
    }
    
    function toggleMoveNumbers() { 
        showMoveNumbers = !showMoveNumbers; 
        document.getElementById('btn-seq').classList.toggle('active', showMoveNumbers);
        render(); 
    }
    
    function goPrevMove() { 
        if (currentMoveIndex > 0) { currentMoveIndex--; render(); } 
    }
    
    function goNextMove() {
        let maxMoves = window.location.hash.substring(1).length / 2;
        if (currentMoveIndex < maxMoves) { currentMoveIndex++; render(); }
    }
    
    function handleInputEnter(e) { 
        if (e.key === 'Enter') document.getElementById('move-input').blur(); 
    }
    
    function jumpToMove() {
        let targetMove = parseInt(document.getElementById('move-input').value);
        let maxMoves = window.location.hash.substring(1).length / 2;
        if (isNaN(targetMove) || targetMove < 0) targetMove = 0;
        if (targetMove > maxMoves) targetMove = maxMoves;
        currentMoveIndex = targetMove; 
        render();
    }

    function copyLink() {
        navigator.clipboard.writeText(window.location.href).then(() => alert("🔗 링크가 복사되었습니다!"));
    }

    function captureBoard() {
        const svgElement = document.getElementById('baduk-board');
        let svgString = new XMLSerializer().serializeToString(svgElement);
        if (!svgString.includes('xmlns="http://www.w3.org/2000/svg"')) {
            svgString = svgString.replace('<svg', '<svg xmlns="http://www.w3.org/2000/svg"');
        }

        const size = 800; 
        const canvas = document.createElement('canvas');
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#D8A45D'; 
        ctx.fillRect(0, 0, size, size);
        ctx.strokeStyle = '#333'; 
        ctx.lineWidth = 12; 
        ctx.strokeRect(0, 0, size, size);

        const img = new Image();
        const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(svgBlob);

        img.onload = function() {
            ctx.drawImage(img, 0, 0, size, size);
            URL.revokeObjectURL(url);
            const a = document.createElement('a');
            a.download = `atomic_baduk_${new Date().toISOString().slice(0,10).replace(/-/g, "")}.png`;
            a.href = canvas.toDataURL('image/png');
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        };
        img.src = url;
    }

    let initialHash = window.location.hash.substring(1);
    currentMoveIndex = initialHash.length / 2;
    render();
</script>

</body>
</html>
